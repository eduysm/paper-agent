services:

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Pull required models on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull qwen2:7b &&
             ollama pull nomic-embed-text &&
             wait"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=ollama/qwen2:7b
      - DB_PATH=/data/doctorate_reader.db
    depends_on:
      - ollama
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  ollama_data:
  app_data:
